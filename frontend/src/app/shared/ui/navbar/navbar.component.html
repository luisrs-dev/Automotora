<!-- ══ ANNOUNCEMENT BAR ══ -->
<div class="announce-bar" role="banner" aria-label="Información de la automotora">
  <div class="announce-content">
    <span class="announce-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      Talca, Región del Maule
    </span>
    <span class="announce-dot" aria-hidden="true">·</span>
    <span class="announce-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
      +56 9 1234 5678
    </span>
    <span class="announce-dot" aria-hidden="true">·</span>
    <span class="announce-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      Lun–Sáb: 9:00–19:00
    </span>
    <span class="announce-dot announce-dot--desktop" aria-hidden="true">·</span>
    <span class="announce-item announce-item--highlight announce-item--desktop">
      ✦ Financiamiento hasta 60 cuotas
    </span>
  </div>
</div>

<!-- ══ NAVBAR ══ -->
<header class="navbar" [class.navbar--scrolled]="scrolled()">
  <div class="navbar__inner max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Logo + Tagline -->
    <a class="navbar__logo" routerLink="/joseluisjara" aria-label="Inicio">
      <img
        src="/logo-transparente.png"
        alt="Automotora José Luis Jara"
        class="navbar__logo-img"
        loading="eager"
      />
      <span class="navbar__logo-divider" aria-hidden="true"></span>
      <span class="navbar__logo-tagline">SEMINUEVOS<br>& USADOS</span>
    </a>

    <!-- Nav links (desktop) -->
    <nav class="navbar__links" aria-label="Navegación principal">
      <a routerLink="/joseluisjara" routerLinkActive="navbar__link--active" [routerLinkActiveOptions]="{exact:true}" class="navbar__link">
        Catálogo
      </a>
      <a href="#" class="navbar__link">Financiamiento</a>
      <a href="#" class="navbar__link">Nosotros</a>
      <a href="#" class="navbar__link">Contacto</a>
    </nav>

    <!-- Right side -->
    <div class="navbar__actions">
      <!-- WhatsApp CTA -->
      <a
        href="https://wa.me/56912345678?text=Hola,%20me%20interesa%20un%20auto%20de%20su%20catálogo"
        target="_blank"
        rel="noopener noreferrer"
        class="navbar__whatsapp"
        aria-label="Contactar por WhatsApp"
      >
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        <span class="navbar__whatsapp-text">WhatsApp</span>
      </a>

      <!-- Separator -->
      <div class="navbar__sep"></div>

      <!-- Dark mode toggle -->
      <button
        (click)="toggleTheme()"
        class="navbar__theme-btn"
        aria-label="Cambiar tema"
        type="button"
      >
        @if (isDarkTheme()) {
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
            <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 1.336a1 1 0 011.415 0l.707.707a1 1 0 01-1.414 1.414l-.707-.707a1 1 0 010-1.414zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zm-1.336 4.22a1 1 0 010 1.415l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.415 0zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.22-1.336a1 1 0 01-1.415 0l-.707-.707a1 1 0 011.414-1.414l.707.707a1 1 0 010 1.415zM2 10a1 1 0 011-1h1a1 1 0 110 2H3a1 1 0 01-1-1zm1.336-4.22a1 1 0 010-1.415l.707-.707a1 1 0 011.414 1.414l-.707.707a1 1 0 01-1.415 0zM10 5a5 5 0 100 10 5 5 0 000-10z"/>
          </svg>
        } @else {
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
          </svg>
        }
      </button>

      <!-- Hamburger (mobile) -->
      <button
        class="navbar__hamburger"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        aria-label="Menú"
        type="button"
      >
        <span class="navbar__hamburger-bar" [class.navbar__hamburger-bar--open]="menuOpen()"></span>
        <span class="navbar__hamburger-bar" [class.navbar__hamburger-bar--open]="menuOpen()"></span>
        <span class="navbar__hamburger-bar" [class.navbar__hamburger-bar--open]="menuOpen()"></span>
      </button>
    </div>
  </div>

  <!-- Mobile drawer -->
  @if (menuOpen()) {
    <nav class="navbar__mobile-menu" aria-label="Menú móvil">
      <a routerLink="/joseluisjara" (click)="toggleMenu()" class="navbar__mobile-link">Catálogo</a>
      <a href="#" (click)="toggleMenu()" class="navbar__mobile-link">Financiamiento</a>
      <a href="#" (click)="toggleMenu()" class="navbar__mobile-link">Nosotros</a>
      <a href="#" (click)="toggleMenu()" class="navbar__mobile-link">Contacto</a>
      <a
        href="https://wa.me/56912345678"
        target="_blank"
        rel="noopener noreferrer"
        class="navbar__mobile-whatsapp"
      >
        <svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Contactar por WhatsApp
      </a>
    </nav>
  }
</header>
